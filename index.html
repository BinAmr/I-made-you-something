<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pink-deep:  #e8557a;
            --pink-mid:   #ff8fab;
            --pink-light: #ffd6e0;
            --pink-pale:  #ffeef3;
            --text-dark:  #1a0a10;
            --text-mid:   #8b3a52;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(150deg, var(--pink-light) 0%, var(--pink-pale) 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center;
            overflow: hidden; cursor: pointer; user-select: none;
        }

        /* ─── SCREEN 1 ──────────────────────────────────────────── */
        #screen1 { display:flex; flex-direction:column; align-items:center; }

        .top-image {
            width:108px;  margin-bottom:18px;
            animation: float 3.2s ease-in-out infinite;
        }
        #title {
            font-family:'Cormorant Garamond',serif;
            font-size:34px; font-weight:700; color:var(--pink-deep); margin-bottom:6px;
        }
        #subtitle {
            font-size:14.5px; font-weight:600; color:var(--text-dark); margin-bottom:24px;
        }
        #giftBtn {
            padding:10px 26px; border:none; border-radius:50px;
            background:var(--pink-deep); color:#fff;
            font-family:'DM Sans',sans-serif; font-size:13.5px; font-weight:500;
            cursor:pointer; box-shadow:0 5px 18px rgba(232,85,122,.35);
            transition: transform .2s, box-shadow .2s;
        }
        #giftBtn:hover, #giftBtn:active { transform:scale(1.04); }

        /* ─── CAKE SCREEN ───────────────────────────────────────── */
        #cakeScreen {
            position:absolute; width:100%; height:100%; top:0; left:0;
            display:none; flex-direction:column;
            justify-content:center; align-items:center;
            background:linear-gradient(150deg,#ffd6e0 0%,#ffeef3 100%);
            overflow:hidden; padding:16px 20px 20px;
        }
        .cake-title {
            font-family:'Cormorant Garamond',serif;
            font-size:clamp(48px,10.5vw,76px); font-weight:900;
            color:var(--pink-deep); line-height:1; letter-spacing:-1px;
            margin-bottom:16px; opacity:0;
            animation: fadeUpIn .6s ease .25s forwards;
        }
        .cake-scene {
            display:flex; align-items:flex-end;
            justify-content:center; gap:14px; width:100%;
        }
        .cake-build { display:flex; flex-direction:column; align-items:center; }

        .flame-el {
            width:13px; height:22px;
            background:radial-gradient(ellipse at 50% 75%,#ffe066,#ff8c00 55%,transparent 100%);
            border-radius:50% 50% 30% 30%;
            transform-origin:bottom center; opacity:0;
        }
        .wick-el {
            width:2px; height:7px; background:#555;
            opacity:0; transform:scaleY(0); transform-origin:bottom;
        }
        .candle-el {
            width:12px; height:38px;
            background:linear-gradient(90deg,#fff0f5 0%,#ffd6e0 50%,#fff0f5 100%);
            border-radius:3px;
            opacity:0; transform:scaleY(0); transform-origin:bottom;
        }
        .layer-el { opacity:0; transform:translateY(32px); position:relative; }

        .l-top {
            width:84px; height:44px;
            background:linear-gradient(180deg,#fff8fa 0%,#ffccd8 100%);
            border-radius:8px 8px 4px 4px;
        }
        .l-top::after {
            content:''; position:absolute; bottom:-5px; left:14px;
            width:9px; height:10px; background:#fff8fa; border-radius:0 0 50% 50%;
        }
        .l-top::before {
            content:''; position:absolute; bottom:-6px; right:13px;
            width:7px; height:11px; background:#fff8fa; border-radius:0 0 50% 50%;
        }
        .l-mid {
            width:116px; height:46px;
            background:linear-gradient(180deg,#ffb3c6 0%,#ff6b9d 100%);
            border-radius:6px;
        }
        .l-bot {
            width:150px; height:54px;
            background:linear-gradient(180deg,#ff8fab 0%,#e8557a 100%);
            border-radius:6px 6px 4px 4px;
        }
        .plate-el {
            width:174px; height:14px;
            background:linear-gradient(180deg,#f5dce4 0%,#ddb8c4 100%);
            border-radius:50%;
            opacity:0; transform:scaleX(.4);
        }
        .cake-tap {
            font-family:'DM Sans',sans-serif; font-size:16px;
            color:var(--text-mid); margin-top:20px; opacity:0;
        }

        /* ─── CAKE KEYFRAMES ───────────────────────────────────── */
        @keyframes plateIn   { to { opacity:1; transform:scaleX(1); } }
        @keyframes layerIn   { to { opacity:1; transform:translateY(0); } }
        @keyframes candleIn  { to { opacity:1; transform:scaleY(1); } }
        @keyframes flameIn   { to { opacity:1; } }
        @keyframes flicker   {
            0%   { transform:scaleY(1)    rotate(-5deg) translateX(-1px); }
            33%  { transform:scaleY(1.22) rotate(4deg)  translateX(1px); }
            66%  { transform:scaleY(.9)   rotate(-3deg); }
            100% { transform:scaleY(1.16) rotate(5deg)  translateX(1px); }
        }

        /* ─── FLOWER SVG (cake screen) ─────────────────────────── */
        .stem-path {
            fill:none; stroke:#b5755a; stroke-width:3.5; stroke-linecap:round;
            stroke-dasharray:320; stroke-dashoffset:320;
        }
        .branch-path {
            fill:none; stroke:#b5755a; stroke-width:2.5; stroke-linecap:round;
            stroke-dasharray:130; stroke-dashoffset:130;
        }
        .leaf-grp   { opacity:0; transform:scale(0); transform-origin:50% 50%; }
        .flower-grp { opacity:0; transform:scale(0); transform-origin:50% 50%; }

        @keyframes growPath { to { stroke-dashoffset:0; } }
        @keyframes bloomIn  { to { opacity:1; transform:scale(1); } }

        /* ─── SHARED ANIMATIONS ────────────────────────────────── */
        @keyframes fadeUpIn {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes float {
            0%  { transform:translateY(0); }
            50% { transform:translateY(-11px); }
            100%{ transform:translateY(0); }
        }
        .slide-up { animation:slideUp .7s cubic-bezier(.4,0,.2,1) forwards; }
        @keyframes slideUp { to { transform:translateY(-100vh); opacity:0; } }

        /* ─── LOADING PULSE ─────────────────────────────────────── */
        @keyframes loadBeat {
            0%   { opacity:.12; transform:scale(.78); }
            14%  { opacity:1;   transform:scale(1.24); }
            28%  { opacity:.45; transform:scale(.95); }
            42%  { opacity:1;   transform:scale(1.15); }
            65%  { opacity:.18; transform:scale(.82); }
            100% { opacity:.12; transform:scale(.78); }
        }
        @keyframes loadBlink {
            0%,100%  { opacity:.18; letter-spacing:.3px; }
            38%,62%  { opacity:1;   letter-spacing:1.2px; }
        }
        @keyframes pulseTap {
            0%,100% { opacity:.75; }
            50%      { opacity:1; }
        }

        /* ─── GARDEN ANIMATIONS ─────────────────────────────────── */
        @keyframes flapWing {
            from { transform: scaleX(1); }
            to   { transform: scaleX(0.06); }
        }
        @keyframes glowPulse {
            from { filter: drop-shadow(0 0 4px rgba(255,218,50,.55)); }
            to   { filter: drop-shadow(0 0 14px rgba(255,218,50,1)) drop-shadow(0 0 22px rgba(255,200,50,.4)); }
        }
        @keyframes gardenSway {
            0%,100% { transform: rotate(-3.5deg); }
            50%     { transform: rotate(3.5deg); }
        }
        @keyframes petalFall {
            0%   { transform: translate(0,0) rotate(0deg); opacity:.82; }
            100% { transform: translate(var(--pf-x,35px), 100vh) rotate(540deg); opacity:0; }
        }
        @keyframes sparkle {
            0%,100% { opacity:0; transform:scale(0); }
            50%     { opacity:1; transform:scale(1); }
        }
        @keyframes revealMsg {
            from { opacity:0; transform:translate(-50%,-100%) scale(0.6); }
            to   { opacity:1; transform:translate(-50%,-100%) scale(1); }
        }
        @keyframes calmFadeIn {
            from { opacity:0; transform:translateY(30px) scale(0.92); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .garden-flower-sway {
            animation: gardenSway 2.6s ease-in-out infinite;
            transform-origin: center bottom;
        }
    </style>
</head>
<body>

    <!-- ── Screen 1 ── -->
    <div id="screen1">
        <img src="images/icon 1.png" class="top-image" alt="icon">
        <h1 id="title">Happy Birthday Patience!</h1>
        <p id="subtitle">I made you a little something 🎁</p>
        <button id="giftBtn" onclick="openGift(event)">Tap to Open Gift</button>
    </div>

    <!-- ── Screen 2: Cake + Flower ── -->
    <div id="cakeScreen">
        <h1 class="cake-title">IT'S YOUR DAY</h1>

        <div class="cake-scene">
            <!-- Cake -->
            <div class="cake-build">
                <div class="flame-el"  id="flameEl"></div>
                <div class="wick-el"   id="wickEl"></div>
                <div class="candle-el" id="candleEl"></div>
                <div class="layer-el l-top" id="ltop"></div>
                <div class="layer-el l-mid" id="lmid"></div>
                <div class="layer-el l-bot" id="lbot"></div>
                <div class="plate-el"  id="plateEl"></div>
            </div>

            <!-- Flower -->
            <div style="flex-shrink:0; width:118px;">
                <svg width="118" height="200" viewBox="0 0 118 200" style="overflow:visible;">
                    <path class="stem-path"   id="stemPath" d="M59 200 C59 168 55 138 59 110 C62 90 56 63 59 34"/>
                    <path class="branch-path" id="br1" d="M58 147 C46 136 28 130 10 120"/>
                    <path class="branch-path" id="br2" d="M59 116 C71 105 88 98 108 94"/>
                    <path class="branch-path" id="br3" d="M58 80  C47 69 33 62 17 53"/>
                    <g id="leaf1" class="leaf-grp">
                        <ellipse cx="9"   cy="118" rx="11" ry="5" transform="rotate(-28 9 118)"   fill="#7bc67e"/>
                    </g>
                    <g id="leaf2" class="leaf-grp">
                        <ellipse cx="109" cy="92"  rx="11" ry="5" transform="rotate(22 109 92)"   fill="#7bc67e"/>
                    </g>
                    <g transform="translate(59,29)">
                        <g id="flower1" class="flower-grp">
                            <ellipse cx="0" cy="-15" rx="8.5" ry="13.5" fill="#ffb3c6"/>
                            <ellipse cx="0" cy="-15" rx="8.5" ry="13.5" fill="#ff8fab"  transform="rotate(72)"/>
                            <ellipse cx="0" cy="-15" rx="8.5" ry="13.5" fill="#ffc8d8"  transform="rotate(144)"/>
                            <ellipse cx="0" cy="-15" rx="8.5" ry="13.5" fill="#ff8fab"  transform="rotate(216)"/>
                            <ellipse cx="0" cy="-15" rx="8.5" ry="13.5" fill="#ffb3c6"  transform="rotate(288)"/>
                            <circle  r="8.5" fill="#ffe8f0"/>
                            <circle  r="3"   fill="#e8557a" opacity=".6"/>
                        </g>
                    </g>
                    <g transform="translate(108,88)">
                        <g id="flower2" class="flower-grp">
                            <ellipse cx="0" cy="-11" rx="6"   ry="10"   fill="#e8557a"/>
                            <ellipse cx="0" cy="-11" rx="6"   ry="10"   fill="#ffb3c6"  transform="rotate(72)"/>
                            <ellipse cx="0" cy="-11" rx="6"   ry="10"   fill="#e8557a"  transform="rotate(144)"/>
                            <ellipse cx="0" cy="-11" rx="6"   ry="10"   fill="#ffb3c6"  transform="rotate(216)"/>
                            <ellipse cx="0" cy="-11" rx="6"   ry="10"   fill="#e8557a"  transform="rotate(288)"/>
                            <circle  r="6"   fill="#fff5f8"/>
                            <circle  r="2.5" fill="#e8557a" opacity=".5"/>
                        </g>
                    </g>
                    <g transform="translate(9,113)">
                        <g id="flower3" class="flower-grp">
                            <ellipse cx="0" cy="-9"  rx="4.5" ry="8"    fill="#ffb3c6"/>
                            <ellipse cx="0" cy="-9"  rx="4.5" ry="8"    fill="#ff8fab"  transform="rotate(72)"/>
                            <ellipse cx="0" cy="-9"  rx="4.5" ry="8"    fill="#ffb3c6"  transform="rotate(144)"/>
                            <ellipse cx="0" cy="-9"  rx="4.5" ry="8"    fill="#ff8fab"  transform="rotate(216)"/>
                            <ellipse cx="0" cy="-9"  rx="4.5" ry="8"    fill="#ffb3c6"  transform="rotate(288)"/>
                            <circle  r="4.5" fill="#fff5f8"/>
                        </g>
                    </g>
                    <g transform="translate(16,47)">
                        <g id="flower4" class="flower-grp">
                            <ellipse cx="0" cy="-10" rx="5.5" ry="9"    fill="#e8557a"/>
                            <ellipse cx="0" cy="-10" rx="5.5" ry="9"    fill="#ffb3c6"  transform="rotate(72)"/>
                            <ellipse cx="0" cy="-10" rx="5.5" ry="9"    fill="#e8557a"  transform="rotate(144)"/>
                            <ellipse cx="0" cy="-10" rx="5.5" ry="9"    fill="#ffb3c6"  transform="rotate(216)"/>
                            <ellipse cx="0" cy="-10" rx="5.5" ry="9"    fill="#e8557a"  transform="rotate(288)"/>
                            <circle  r="5.5" fill="#fff5f8"/>
                        </g>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <script>
        let stage = 0;
        const $ = id => document.getElementById(id);
        const at = (ms, fn) => setTimeout(fn, ms);

        /* ── Screen 1 → Cake ─────────────────────────────────── */
        function openGift(e) {
            e.stopPropagation();
            $('screen1').style.display = 'none';
            $('cakeScreen').style.display = 'flex';
            stage = 1;
            animateCake();
            animateFlower();
        }

        /* ── Cake build ─────────────────────────────────────── */
        function animateCake() {
            const a = (id, css) => $(id).style.animation = css;
            at(260,  () => a('plateEl',  'plateIn  .45s ease forwards'));
            at(680,  () => a('lbot',     'layerIn  .52s cubic-bezier(.34,1.4,.64,1) forwards'));
            at(1180, () => a('lmid',     'layerIn  .52s cubic-bezier(.34,1.4,.64,1) forwards'));
            at(1680, () => a('ltop',     'layerIn  .52s cubic-bezier(.34,1.4,.64,1) forwards'));
            at(2160, () => {
                a('wickEl',   'candleIn .3s  ease forwards');
                a('candleEl', 'candleIn .42s cubic-bezier(.34,1.55,.64,1) forwards');
            });
            at(2640, () => a('flameEl', 'flameIn .4s ease forwards, flicker .22s ease-in-out infinite alternate'));
        }

        /* ── Flower stem/bloom ──────────────────────────────── */
        function animateFlower() {
            const a = (id, css) => $(id).style.animation = css;
            at(820,  () => a('stemPath', 'growPath 1.2s ease forwards'));
            at(1720, () => a('br1',      'growPath  .7s ease forwards'));
            at(2020, () => a('br2',      'growPath  .7s ease forwards'));
            at(2320, () => a('br3',      'growPath  .6s ease forwards'));
            at(1920, () => a('leaf1',    'bloomIn   .4s ease forwards'));
            at(2240, () => a('leaf2',    'bloomIn   .4s ease forwards'));
            at(2480, () => a('flower3',  'bloomIn   .5s cubic-bezier(.34,1.7,.64,1) forwards'));
            at(2720, () => a('flower2',  'bloomIn   .5s cubic-bezier(.34,1.7,.64,1) forwards'));
            at(2980, () => a('flower1',  'bloomIn   .55s cubic-bezier(.34,1.7,.64,1) forwards'));
            at(3140, () => a('flower4',  'bloomIn   .5s cubic-bezier(.34,1.7,.64,1) forwards'));
        }

        /* ── Cake tap → Flower Garden ─────────────────────────── */
        document.body.addEventListener('click', () => {
            if (stage === 1) {
                stage = 2;
                $('cakeScreen').classList.add('slide-up');
                at(700, () => {
                    $('cakeScreen').style.display = 'none';
                    showLoading(
                        'linear-gradient(150deg,#ffd6e0 0%,#ffeef3 100%)',
                        'Loading birthday surprises...',
                        showFlowerGarden   /* ← goes to garden first */
                    );
                });
            }
        });

        /* ── Shared loading screen ──────────────────────────── */
        function showLoading(bg, text, next) {
            const wrap = div(`
                position:absolute;width:100%;height:100%;top:0;left:0;
                background:${bg};
                display:flex;flex-direction:column;justify-content:center;align-items:center;
                z-index:80;
            `);
            const inner = div(`
                display:flex;flex-direction:column;align-items:center;
                opacity:0;transform:translateY(22px);
                transition:opacity .45s ease,transform .45s ease;
            `);
            inner.innerHTML = `
                <div style="font-size:46px;display:inline-block;animation:loadBeat 1.08s ease-in-out infinite;">❤️</div>
                <div style="font-family:'DM Sans',sans-serif;font-size:16.5px;font-weight:500;color:#cc3a60;margin-top:15px;animation:loadBlink 1.08s ease-in-out infinite;">${text}</div>
            `;
            wrap.appendChild(inner);
            document.body.appendChild(wrap);
            at(40,   () => { inner.style.opacity = '1'; inner.style.transform = 'translateY(0)'; });
            at(2400, () => {
                inner.style.opacity = '0';
                inner.style.transform = 'translateY(-30px)';
                at(500, () => { wrap.remove(); next(); });
            });
        }

        /* ══════════════════════════════════════════════════════════
           ── FLOWER GARDEN SECTION ──────────────────────────────── */
        function showFlowerGarden() {
            const W = window.innerWidth, H = window.innerHeight;
            let flowerCount  = 0;
            let allFlowers   = [];  /* all user-planted flower containers */
            let textStarted  = false;
            let calmTrigger  = false;
            let specialDone  = false;
            let bfFollowing  = true;
            let holdData     = null; /* { x, y, start, previewEl } */

            /* ── Section ──────────────────────────────────────────── */
            const section = div(`
                position:absolute;width:100%;height:100%;top:0;left:0;
                overflow:hidden;z-index:20;cursor:crosshair;
                background:linear-gradient(180deg,
                  #87ceeb 0%, #aad8f0 22%,
                  #cce8f7 44%, #fce4ec 68%,
                  #f0faf0 100%);
            `);
            document.body.appendChild(section);

            /* ── Grass ────────────────────────────────────────────── */
            const grassEl = document.createElement('div');
            grassEl.style.cssText = `position:absolute;bottom:0;left:0;width:100%;height:90px;z-index:8;pointer-events:none;`;
            grassEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="90" viewBox="0 0 800 90" preserveAspectRatio="none">
              <path d="M0,90 L0,52 C50,22 100,58 150,36 C200,14 250,55 300,32 C350,9 400,50 450,30 C500,10 550,52 600,34 C650,16 700,54 750,35 C775,25 790,48 800,38 L800,90 Z" fill="#8bc34a"/>
              <path d="M0,90 L0,68 C40,48 80,72 120,58 C160,44 200,70 240,57 C280,44 320,70 360,58 C400,46 440,70 480,58 C520,46 560,70 600,58 C640,46 680,68 720,56 C760,44 785,64 800,60 L800,90 Z" fill="#7cb342"/>
              <path d="M0,90 L0,80 C60,72 120,84 180,78 C240,72 300,85 360,80 C420,75 480,86 540,81 C600,76 660,84 720,79 C760,75 785,82 800,80 L800,90 Z" fill="#6a9e35"/>
            </svg>`;
            section.appendChild(grassEl);

            /* ── Hint text ────────────────────────────────────────── */
            const hint = document.createElement('div');
            hint.style.cssText = `
                position:absolute;top:18px;left:50%;
                transform:translateX(-50%);
                font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;
                color:rgba(80,35,60,.78);z-index:40;
                background:rgba(255,255,255,.65);backdrop-filter:blur(6px);
                padding:5px 16px;border-radius:18px;pointer-events:none;
                white-space:nowrap;animation:pulseTap 2.4s ease-in-out infinite;
                transition:opacity .5s ease;
            `;
            hint.textContent = '🌸  Tap anywhere to grow flowers';
            section.appendChild(hint);

            /* ── Flower factory ───────────────────────────────────── */
            const palettes = [
                ['#ffb3c6','#ffc8d8','#ff8fab','#ffd6e0'],
                ['#c9b6ff','#d4a5f7','#b8d4ff','#e0c8ff'],
                ['#ffe066','#ffcd42','#ffd54f','#fff3a0'],
                ['#a8e6cf','#9bf6ff','#a0c4ff','#b8f0d8'],
                ['#ffafcc','#bde0fe','#cdb4db','#ffc8dd','#caffbf','#fdffb6'],
            ];

            function spawnFlower(x, y, sizeMult, isText) {
                const level  = Math.min(4, Math.floor(flowerCount / 4));
                const isRare = !isText && (Math.random() < 0.07 + level * 0.04);
                const pal    = palettes[isText ? 0 : level];
                const c1     = pal[Math.floor(Math.random() * pal.length)];
                const c2     = pal[Math.floor(Math.random() * pal.length)];
                const nP     = isText ? 5 : ([4,5,5,6,8][level] + (Math.random() < .35 ? 1 : 0));
                const bR     = isText
                               ? 5 + Math.random() * 2
                               : Math.round((9 + level * 3.2) * sizeMult * (0.82 + Math.random()*.38));
                const sH     = isText
                               ? 16 + Math.random() * 10
                               : Math.round((42 + Math.random() * 34) * sizeMult);
                const sW     = Math.max(2, bR * 0.22);

                const container = document.createElement('div');
                container.style.cssText = `
                    position:absolute;
                    left:${x}px;
                    top:${y - sH - bR * 2.8}px;
                    width:${bR * 5.5}px;
                    height:${sH + bR * 2.8}px;
                    margin-left:${-bR * 2.75}px;
                    pointer-events:none;
                    z-index:10;
                    transform-origin:center bottom;
                `;

                /* stem */
                const stem = document.createElement('div');
                stem.style.cssText = `
                    position:absolute;bottom:0;left:50%;
                    margin-left:${-sW / 2}px;
                    width:${sW}px;height:0;
                    background:linear-gradient(to top,#3e8820,#80c444);
                    border-radius:${sW}px;
                `;
                container.appendChild(stem);

                /* bloom wrapper */
                const bloomWrap = document.createElement('div');
                bloomWrap.style.cssText = `
                    position:absolute;
                    bottom:${sH}px;
                    left:50%;
                    transform:translate(-50%,50%) scale(0);
                    transform-origin:50% 100%;
                `;

                /* SVG petals */
                const svgNS = 'http://www.w3.org/2000/svg';
                const sz    = bR * 4.8;
                const svg   = document.createElementNS(svgNS, 'svg');
                svg.setAttribute('width',  sz);
                svg.setAttribute('height', sz);
                svg.setAttribute('viewBox',`${-sz/2} ${-sz/2} ${sz} ${sz}`);
                svg.style.overflow = 'visible';

                /* outer petals */
                for (let i = 0; i < nP; i++) {
                    const p = document.createElementNS(svgNS, 'ellipse');
                    p.setAttribute('cx', 0);
                    p.setAttribute('cy', -bR * 1.15);
                    p.setAttribute('rx',  bR * 0.52);
                    p.setAttribute('ry',  bR * 0.94);
                    p.setAttribute('fill', i % 2 === 0 ? c1 : c2);
                    p.setAttribute('transform', `rotate(${360 / nP * i})`);
                    p.setAttribute('opacity', '0.88');
                    svg.appendChild(p);
                }

                /* inner petal layer for higher levels */
                if (level >= 2 && !isText) {
                    for (let i = 0; i < nP; i++) {
                        const p2 = document.createElementNS(svgNS, 'ellipse');
                        p2.setAttribute('cx', 0);
                        p2.setAttribute('cy', -bR * 0.72);
                        p2.setAttribute('rx',  bR * 0.34);
                        p2.setAttribute('ry',  bR * 0.58);
                        p2.setAttribute('fill', c1);
                        p2.setAttribute('transform', `rotate(${360 / nP * i + 180 / nP})`);
                        p2.setAttribute('opacity', '0.6');
                        svg.appendChild(p2);
                    }
                }

                /* center */
                const ctr = document.createElementNS(svgNS, 'circle');
                ctr.setAttribute('cx', 0); ctr.setAttribute('cy', 0);
                ctr.setAttribute('r', bR * 0.44);
                ctr.setAttribute('fill', isRare ? '#ffe566' : (isText ? '#fff9d8' : '#fff3e0'));
                svg.appendChild(ctr);

                /* rare glow + sparkles */
                if (isRare) {
                    svg.style.animation = 'glowPulse 1.4s ease-in-out infinite alternate';
                    /* tiny sparkle dots */
                    for (let s = 0; s < 5; s++) {
                        const ang = (s / 5) * 360;
                        const rad = bR * 1.55;
                        const sp  = document.createElementNS(svgNS, 'circle');
                        sp.setAttribute('cx', Math.cos(ang * Math.PI / 180) * rad);
                        sp.setAttribute('cy', Math.sin(ang * Math.PI / 180) * rad);
                        sp.setAttribute('r', bR * 0.12);
                        sp.setAttribute('fill', '#ffe566');
                        sp.style.animation = `sparkle ${0.6 + s * 0.18}s ease-in-out ${s * 0.1}s infinite`;
                        svg.appendChild(sp);
                    }
                }

                bloomWrap.appendChild(svg);
                container.appendChild(bloomWrap);
                section.insertBefore(container, grassEl);

                /* animate */
                const stemDur  = isText ? 220 : 360 + Math.random() * 140;
                const bloomDur = isText ? 280 : 460 + Math.random() * 120;

                requestAnimationFrame(() => {
                    stem.style.transition = `height ${stemDur}ms cubic-bezier(.4,0,.22,1)`;
                    stem.style.height     = sH + 'px';
                    setTimeout(() => {
                        bloomWrap.style.transition = `transform ${bloomDur}ms cubic-bezier(.34,1.72,.64,1)`;
                        bloomWrap.style.transform  = 'translate(-50%,50%) scale(1)';
                    }, stemDur * 0.68);
                });

                if (!isText) {
                    flowerCount++;
                    allFlowers.push(container);
                    updateHint();
                    checkProgression();
                }
                return container;
            }

            /* ── Special centre flower ────────────────────────────── */
            function buildSpecialFlower() {
                const sx = W * 0.5, sy = H * 0.75;
                const bR = 22, sH = 70, nP = 8, sW = 4;

                const container = document.createElement('div');
                container.style.cssText = `
                    position:absolute;
                    left:${sx}px;top:${sy - sH - bR * 2.8}px;
                    width:${bR * 5.5}px;height:${sH + bR * 2.8}px;
                    margin-left:${-bR * 2.75}px;
                    z-index:15;cursor:pointer;
                    transform-origin:center bottom;
                `;

                const stem = document.createElement('div');
                stem.style.cssText = `
                    position:absolute;bottom:0;left:50%;
                    margin-left:${-sW / 2}px;
                    width:${sW}px;height:0;
                    background:linear-gradient(to top,#2d6b10,#72b830);
                    border-radius:${sW}px;
                    transition:height .9s cubic-bezier(.4,0,.2,1);
                `;

                const bloomWrap = document.createElement('div');
                bloomWrap.style.cssText = `
                    position:absolute;bottom:${sH}px;left:50%;
                    transform:translate(-50%,50%) scale(0);
                    transform-origin:50% 100%;
                    transition:transform 1.1s cubic-bezier(.34,1.5,.64,1);
                `;

                const svgNS = 'http://www.w3.org/2000/svg';
                const sz    = bR * 5;
                const svg   = document.createElementNS(svgNS, 'svg');
                svg.setAttribute('width', sz); svg.setAttribute('height', sz);
                svg.setAttribute('viewBox', `${-sz/2} ${-sz/2} ${sz} ${sz}`);
                svg.style.cssText = 'overflow:visible;filter:drop-shadow(0 0 7px rgba(232,85,122,.55));';

                const outerC = ['#e8557a','#ff8fab','#ffb3c6','#ff6b9d','#e8557a','#ff8fab','#ffccd8','#ff8fab'];
                for (let i = 0; i < nP; i++) {
                    const p = document.createElementNS(svgNS, 'ellipse');
                    p.setAttribute('cx', 0); p.setAttribute('cy', -bR * 1.25);
                    p.setAttribute('rx', bR * 0.56); p.setAttribute('ry', bR * 1.04);
                    p.setAttribute('fill', outerC[i]);
                    p.setAttribute('transform', `rotate(${360 / nP * i})`);
                    p.setAttribute('opacity', '0.92');
                    svg.appendChild(p);
                }
                for (let i = 0; i < nP; i++) {
                    const p2 = document.createElementNS(svgNS, 'ellipse');
                    p2.setAttribute('cx', 0); p2.setAttribute('cy', -bR * 0.78);
                    p2.setAttribute('rx', bR * 0.35); p2.setAttribute('ry', bR * 0.64);
                    p2.setAttribute('fill', '#ffccd8');
                    p2.setAttribute('transform', `rotate(${360 / nP * i + 22.5})`);
                    p2.setAttribute('opacity', '0.7');
                    svg.appendChild(p2);
                }
                const ctr = document.createElementNS(svgNS, 'circle');
                ctr.setAttribute('cx', 0); ctr.setAttribute('cy', 0);
                ctr.setAttribute('r', bR * 0.46);
                ctr.setAttribute('fill', '#ffe0ea');
                svg.appendChild(ctr);
                svg.style.animation = 'glowPulse 2s ease-in-out infinite alternate';

                bloomWrap.appendChild(svg);
                container.appendChild(stem);
                container.appendChild(bloomWrap);
                section.insertBefore(container, grassEl);

                /* pulsing ring hint */
                const ring = document.createElement('div');
                ring.style.cssText = `
                    position:absolute;bottom:-12px;left:50%;
                    width:54px;height:54px;margin-left:-27px;
                    border:2.5px solid rgba(232,85,122,.35);
                    border-radius:50%;
                    animation:loadBeat 2.2s ease-in-out infinite;
                    pointer-events:none;
                `;
                container.appendChild(ring);

                at(250, () => {
                    stem.style.height     = sH + 'px';
                    at(640, () => {
                        bloomWrap.style.transform = 'translate(-50%,50%) scale(1)';
                    });
                });

                /* special click reveal */
                container.addEventListener('click', e => {
                    e.stopPropagation();
                    if (specialDone) return;
                    specialDone = true;
                    ring.remove();

                    const bubble = document.createElement('div');
                    bubble.style.cssText = `
                        position:absolute;
                        left:50%;bottom:${sH + bR * 3}px;
                        transform:translateX(-50%) scale(0);
                        background:rgba(255,255,255,.94);
                        border:2px solid #ffb3c6;
                        border-radius:18px;padding:12px 18px;
                        font-family:'DM Sans',sans-serif;font-size:12.5px;
                        color:#c03060;text-align:center;
                        box-shadow:0 8px 26px rgba(232,85,122,.22);
                        white-space:nowrap;pointer-events:none;
                        z-index:60;
                        transition:transform .7s cubic-bezier(.34,1.7,.64,1);
                    `;
                    bubble.innerHTML = `❤️ You make every day bloom ❤️<br><span style="font-size:11px;opacity:.68;font-weight:300;">Happy Birthday, Patience!</span>`;
                    container.appendChild(bubble);
                    requestAnimationFrame(() => {
                        bubble.style.transform = 'translateX(-50%) scale(1)';
                    });

                    /* slow re-bloom */
                    bloomWrap.style.transition = 'transform 1.4s cubic-bezier(.34,1.4,.64,1)';
                    bloomWrap.style.transform  = 'translate(-50%,50%) scale(1.28)';
                    at(1400, () => { bloomWrap.style.transform = 'translate(-50%,50%) scale(1.12)'; });
                });

                return container;
            }
            buildSpecialFlower();

            /* ── Butterfly ─────────────────────────────────────────── */
            let bfx = W * 0.25, bfy = H * 0.28;
            let btx = bfx, bty = bfy;

            const bfEl = document.createElement('div');
            bfEl.style.cssText = `position:absolute;pointer-events:none;z-index:50;will-change:left,top;`;
            bfEl.innerHTML = `<svg width="46" height="32" viewBox="0 0 46 32" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
              <path d="M23 16 C12 4 0 6 2 14 C4 22 15 21 23 16"
                fill="#ffb3d9" opacity=".9"
                style="transform-origin:23px 16px;animation:flapWing .32s ease-in-out infinite alternate;"/>
              <path d="M23 16 C34 4 46 6 44 14 C42 22 31 21 23 16"
                fill="#ffb3d9" opacity=".9"
                style="transform-origin:23px 16px;animation:flapWing .32s ease-in-out infinite alternate;"/>
              <path d="M23 17 C14 27 3 27 5 20 C7 13 15 15 23 17"
                fill="#f9c2d8" opacity=".72"
                style="transform-origin:23px 17px;animation:flapWing .32s ease-in-out infinite alternate;"/>
              <path d="M23 17 C32 27 43 27 41 20 C39 13 31 15 23 17"
                fill="#f9c2d8" opacity=".72"
                style="transform-origin:23px 17px;animation:flapWing .32s ease-in-out infinite alternate;"/>
              <!-- Body -->
              <ellipse cx="23" cy="16" rx="2.5" ry="7" fill="#7a4060"/>
              <!-- Antennae -->
              <line x1="21" y1="9" x2="15" y2="2" stroke="#7a4060" stroke-width="1.1" stroke-linecap="round"/>
              <line x1="25" y1="9" x2="31" y2="2" stroke="#7a4060" stroke-width="1.1" stroke-linecap="round"/>
              <circle cx="14.5" cy="1.5" r="2" fill="#e8557a"/>
              <circle cx="31.5" cy="1.5" r="2" fill="#e8557a"/>
            </svg>`;
            section.appendChild(bfEl);

            function bfLoop() {
                if (!section.parentNode) return;
                bfx += (btx - bfx) * 0.038;
                bfy += (bty - bfy) * 0.038;
                bfEl.style.left = (bfx - 23) + 'px';
                bfEl.style.top  = (bfy - 16) + 'px';
                requestAnimationFrame(bfLoop);
            }
            bfLoop();

            section.addEventListener('mousemove', e => {
                if (!bfFollowing) return;
                const r = section.getBoundingClientRect();
                btx = e.clientX - r.left;
                bty = e.clientY - r.top;
            });
            section.addEventListener('touchmove', e => {
                if (!bfFollowing) return;
                const r = section.getBoundingClientRect();
                btx = e.touches[0].clientX - r.left;
                bty = e.touches[0].clientY - r.top;
            }, { passive: true });

            /* occasionally land on a flower */
            setInterval(() => {
                if (allFlowers.length < 2 || !section.parentNode) return;
                bfFollowing = false;
                const f  = allFlowers[Math.floor(Math.random() * allFlowers.length)];
                const r  = section.getBoundingClientRect();
                const fr = f.getBoundingClientRect();
                btx = fr.left - r.left + fr.width  / 2;
                bty = fr.top  - r.top  + 12;
                at(2400, () => { bfFollowing = true; });
            }, 5500);

            /* ── Falling petals ──────────────────────────────────────── */
            const petalColors = ['#ffb3c6','#ffd6e0','#e8c8ff','#b8d8ff','#fff0a0','#ffc8d8'];
            const petalLoop = setInterval(() => {
                if (!section.parentNode) { clearInterval(petalLoop); return; }
                const petal = document.createElement('div');
                const sz    = 7 + Math.random() * 11;
                const drift = (Math.random() - 0.5) * 130;
                const dur   = 3.5 + Math.random() * 3.5;
                petal.style.cssText = `
                    position:absolute;
                    left:${Math.random() * W}px;top:-18px;
                    width:${sz}px;height:${sz * 1.35}px;
                    background:${petalColors[Math.floor(Math.random() * petalColors.length)]};
                    border-radius:52% 48% 56% 44%;
                    transform:rotate(${Math.random() * 360}deg);
                    opacity:.78;pointer-events:none;z-index:35;
                    --pf-x:${drift}px;
                    animation:petalFall ${dur}s ease-in forwards;
                `;
                section.appendChild(petal);
                at(dur * 1000 + 100, () => { if (petal.parentNode) petal.remove(); });
            }, 850);

            /* ── Hold-to-grow ─────────────────────────────────────────── */
            function onPointerDown(cx, cy) {
                if (cy > H - 85) return; /* don't plant in grass */
                holdData = { x: cx, y: cy, start: Date.now(), preview: null };

                const pv = document.createElement('div');
                pv.style.cssText = `
                    position:absolute;
                    left:${cx}px;top:${cy}px;
                    width:3px;margin-left:-1.5px;height:0;
                    background:rgba(105,180,60,.55);
                    border-radius:2px;z-index:28;pointer-events:none;
                `;
                section.appendChild(pv);
                holdData.preview = pv;

                (function animPv() {
                    if (!holdData || !pv.parentNode) return;
                    const p = Math.min(1, (Date.now() - holdData.start) / 1500);
                    const h = p * 75;
                    pv.style.height = h + 'px';
                    pv.style.top    = (cy - h) + 'px';
                    requestAnimationFrame(animPv);
                })();
            }

            function onPointerUp(cx, cy) {
                if (!holdData) return;
                const { x, y, start, preview } = holdData;
                holdData = null;
                if (preview && preview.parentNode) preview.remove();

                const prog     = Math.min(1, (Date.now() - start) / 1500);
                const sizeMult = 0.6 + prog * 0.85;
                spawnFlower(x, y, sizeMult, false);
            }

            /* Mouse */
            section.addEventListener('mousedown', e => {
                const r = section.getBoundingClientRect();
                onPointerDown(e.clientX - r.left, e.clientY - r.top);
            });
            section.addEventListener('mouseup', e => {
                const r = section.getBoundingClientRect();
                onPointerUp(e.clientX - r.left, e.clientY - r.top);
            });
            /* Touch */
            section.addEventListener('touchstart', e => {
                e.preventDefault();
                const r = section.getBoundingClientRect();
                onPointerDown(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
            }, { passive: false });
            section.addEventListener('touchend', e => {
                e.preventDefault();
                if (holdData) onPointerUp(holdData.x, holdData.y);
            }, { passive: false });
            /* Global mouseup safety net */
            const docUp = () => { if (holdData) onPointerUp(holdData.x, holdData.y); };
            document.addEventListener('mouseup', docUp);

            /* ── Hint updates ─────────────────────────────────────────── */
            function updateHint() {
                if (flowerCount === 1)  hint.textContent = '✨ Keep going, more flowers!';
                if (flowerCount === 4)  hint.textContent = '💜 Hold longer for a bigger bloom!';
                if (flowerCount === 8)  hint.textContent = '🌼 So pretty! A few more magic ones…';
                if (flowerCount === 12) hint.textContent = '✨ Something special is almost ready!';
                if (flowerCount === 15) { hint.style.opacity = '0'; startTextFlowers(); }
            }

            /* ── Text flowers (canvas pixel sampling) ─────────────────── */
            function startTextFlowers() {
                const offscreen = document.createElement('canvas');
                const fSize     = Math.max(16, Math.floor(W / 16));
                offscreen.width  = W;
                offscreen.height = fSize * 3;
                const ctx = offscreen.getContext('2d');
                ctx.fillStyle = '#000';
                ctx.font = `bold ${fSize}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('HAPPY BIRTHDAY', W / 2, fSize);
                ctx.fillText('PATIENCE  ♡', W / 2, fSize * 2.3);

                const imgData = ctx.getImageData(0, 0, W, fSize * 3).data;
                const step    = Math.max(7, Math.floor(fSize / 3));
                const yStart  = H * 0.07;
                const positions = [];

                for (let row = 0; row < fSize * 3; row += step) {
                    for (let col = 0; col < W; col += step) {
                        const idx = (row * W + col) * 4;
                        if (imgData[idx + 3] > 110) {
                            positions.push({
                                x: col + (Math.random() - .5) * step * .6,
                                y: yStart + row + (Math.random() - .5) * step * .6
                            });
                        }
                    }
                }

                /* shuffle for organic feel */
                for (let i = positions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [positions[i], positions[j]] = [positions[j], positions[i]];
                }

                let i = 0;
                const textLoop = setInterval(() => {
                    if (!section.parentNode || i >= positions.length) {
                        clearInterval(textLoop);
                        /* after text is done, give small pause then calm */
                        at(600, () => { if (!calmTrigger) { calmTrigger = true; triggerCalm(); } });
                        return;
                    }
                    spawnFlower(positions[i].x, positions[i].y, 1, true);
                    i++;
                }, 90);
            }

            /* ── Progression check ────────────────────────────────────── */
            function checkProgression() {
                if (flowerCount >= 20 && !calmTrigger && !textStarted) {
                    calmTrigger = true;
                    at(500, triggerCalm);
                }
            }

            /* ── Calm moment ──────────────────────────────────────────── */
            function triggerCalm() {
                /* sway all flowers */
                allFlowers.forEach((f, i) => {
                    const dur = 2.2 + Math.random() * 1.4;
                    const del = Math.random() * 0.9;
                    f.style.animation       = `gardenSway ${dur}s ease-in-out ${del}s infinite`;
                    f.style.transformOrigin = 'center bottom';
                });

                hint.style.opacity = '0';

                /* soft overlay + message */
                const overlay = div(`
                    position:absolute;top:0;left:0;width:100%;height:100%;
                    display:flex;align-items:center;justify-content:center;
                    z-index:65;pointer-events:none;
                    background:rgba(255,240,248,0);
                    transition:background .9s ease;
                `);
                section.appendChild(overlay);
                at(60, () => { overlay.style.background = 'rgba(255,240,248,.28)'; });

                const card = div(`
                    background:rgba(255,255,255,.9);
                    border-radius:22px;padding:26px 30px;
                    text-align:center;
                    box-shadow:0 18px 50px rgba(232,85,122,.18),0 4px 12px rgba(0,0,0,.05);
                    opacity:0;
                    animation:calmFadeIn .9s cubic-bezier(.34,1.4,.64,1) .3s forwards;
                    backdrop-filter:blur(10px);
                `);
                card.innerHTML = `
                    <div style="font-size:34px;margin-bottom:10px;">🌸</div>
                    <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#e8557a;line-height:1.1;">Happy Birthday</div>
                    <div style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:900;color:#e8557a;">Patience!</div>
                    <div style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:#b05070;margin-top:10px;line-height:1.55;">May every day be as beautiful<br>as a garden in full bloom 🌷</div>
                `;
                overlay.appendChild(card);

                /* after message → transition to IMAGINATION */
                at(3400, () => {
                    document.removeEventListener('mouseup', docUp);
                    clearInterval(petalLoop);
                    section.style.cssText += 'transition:opacity .65s ease;opacity:0;';
                    at(680, () => {
                        section.remove();
                        showLoading(
                            'linear-gradient(150deg,#ffd6e0 0%,#ffeef3 100%)',
                            '✨  One more surprise...',
                            showFinalScreen
                        );
                    });
                });
            }
        }
        /* ══════════════════════════════════════════════════════════ */

        /* ── IMAGINATION / Final Screen ─────────────────────────── */
        function showFinalScreen() {
            const final = div(`
                position:absolute;width:100%;height:100%;top:0;left:0;
                background:linear-gradient(155deg,#ffe0ed 0%,#fff9be 100%);
                display:flex;flex-direction:column;justify-content:center;align-items:center;
                cursor:pointer;overflow:hidden;
            `);

            for (let i = 0; i < 11; i++) {
                const sz = 12 + i * 6;
                final.appendChild(div(`
                    position:absolute;
                    width:${sz}px;height:${sz}px;border-radius:50%;
                    border:2px solid rgba(255,183,77,${.15+i*.018});
                    top:${6+i*8.5}%;left:${2+i*9}%;
                    pointer-events:none;
                    animation:float ${1.7+i*.22}s ease-in-out ${i*.13}s infinite;
                `));
            }

            const content = div(`
                display:flex;flex-direction:column;align-items:center;
                opacity:0;transform:translateY(64px);
                transition:opacity .88s ease,transform .88s cubic-bezier(.22,1,.36,1);
                text-align:center;padding:0 26px;z-index:1;
            `);
            content.innerHTML = `
                <div style="padding:5px 17px;border-radius:20px;background:linear-gradient(90deg,#ffb347,#ffdd55);font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:800;color:#5a3000;letter-spacing:2.2px;margin-bottom:13px;box-shadow:0 4px 14px rgba(255,183,77,.5);">🌈  I M A G I N A T I O N  ✨</div>
                <div style="font-family:'Fredoka One',cursive;font-size:clamp(42px,9vw,68px);color:#e8557a;line-height:1.06;letter-spacing:1.5px;text-shadow:3px 3px 0 rgba(255,205,50,.6),6px 6px 0 rgba(255,140,100,.14);">BEST DAY<br>EVER!</div>
                <div style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#b06030;margin-top:13px;">Even Patrick agrees 🌟</div>
                <div style="font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:300;font-style:italic;color:rgba(160,100,50,.62);margin-top:5px;">"You're aging like milk… but like, expensive milk.</div>
            `;

            const tapTxt = div(`
                position:absolute;bottom:28px;
                font-family:'DM Sans',sans-serif;font-size:13px;
                color:#b06030;opacity:.85;letter-spacing:.6px;
                animation:pulseTap 2.2s ease-in-out infinite;
                transition:opacity .4s,transform .5s;z-index:1;
            `);
            tapTxt.textContent = 'TAP anywhere to continue';

            final.appendChild(content);
            final.appendChild(tapTxt);
            document.body.appendChild(final);
            at(55, () => { content.style.opacity = '1'; content.style.transform = 'translateY(0)'; });

            final.addEventListener('click', () => {
                content.style.opacity = '0'; content.style.transform = 'translateY(-82px)';
                tapTxt.style.opacity  = '0'; tapTxt.style.transform   = 'translateY(18px)';
                at(760, () => { final.remove(); showCardsSection(); });
            });
        }

        /* ── Cards section (BIGGER) ─────────────────────────────── */
        function showCardsSection() {
            const section = div(`
                position:absolute;width:100%;height:100%;top:0;left:0;
                display:flex;justify-content:center;align-items:center;
                flex-wrap:wrap;gap:12px;
                background:linear-gradient(150deg,#ffd6e0 0%,#ffe3eb 100%);
                cursor:pointer;overflow:hidden;padding:24px 16px;
            `);

            const data = [
                { rot:  9, cap:'You light up every room 🌟' },
                { rot: -9, cap:'Forever my favorite person 🌸' },
                { rot:  6, cap:'Born to be iconic ✨' },
                { rot: -5, cap:'Main character energy 💕' },
            ];

            const cards = data.map(({ rot, cap }) => {
                const card = div(`
                    background:#fff;border-radius:16px;padding:12px 12px 18px;
                    width:calc(48% - 6px);max-width:210px;
                    box-shadow:0 12px 32px rgba(232,85,122,.17),0 3px 8px rgba(0,0,0,.07);
                    display:flex;flex-direction:column;align-items:center;
                    transform:rotate(${rot}deg) translateY(160px);
                    opacity:0;
                    transition:
                        transform .68s cubic-bezier(.34,1.48,.64,1),
                        opacity .52s ease,
                        box-shadow .3s ease;
                `);
                card.innerHTML = `
                    <img src="images/sample pic.jpg" style="
                        width:100%;height:165px;object-fit:cover;
                        border-radius:10px;display:block;pointer-events:none;
                    " alt="">
                    <p style="
                        font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
                        color:#7a4055;margin-top:10px;text-align:center;line-height:1.45;
                        pointer-events:none;
                    ">${cap}</p>
                `;
                card.addEventListener('mouseenter', () => {
                    card.style.transform   = `rotate(0deg) scale(1.07) translateY(-8px)`;
                    card.style.boxShadow   = '0 28px 60px rgba(232,85,122,.3),0 5px 12px rgba(0,0,0,.09)';
                    card.style.zIndex      = '10';
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform   = `rotate(${rot}deg) translateY(0)`;
                    card.style.boxShadow   = '0 12px 32px rgba(232,85,122,.17)';
                    card.style.zIndex      = '';
                });
                section.appendChild(card);
                return { el: card, rot };
            });

            document.body.appendChild(section);

            cards.forEach(({ el: c, rot }, i) => {
                at(80 + i * 175, () => {
                    c.style.transform = `rotate(${rot}deg) translateY(0)`;
                    c.style.opacity   = '1';
                });
            });

            section.addEventListener('click', () => {
                const exits = [
                    'rotate(28deg) translate(-150%,-110%)',
                    'rotate(-24deg) translate(150%,-95%)',
                    'rotate(20deg) translate(-95%, 150%)',
                    'rotate(-30deg) translate(115%, 135%)',
                ];
                cards.forEach(({ el: c }, i) => {
                    c.style.transition = 'transform .58s ease, opacity .48s ease';
                    c.style.transform  = exits[i];
                    c.style.opacity    = '0';
                });
                at(620, () => {
                    section.remove();
                    showLoading('#fff0f3', 'One last message...', showBirthdayCard);
                });
            });
        }

        /* ── Final birthday card ───────────────────────────────── */
        function showBirthdayCard() {
            const section = div(`
                position:absolute;width:100%;height:100%;top:0;left:0;
                display:flex;justify-content:center;align-items:center;
                background:linear-gradient(150deg,#ffd6e0 0%,#ffe3eb 100%);
                overflow:hidden;
            `);
            const card = div(`
                background:#fff;border-radius:22px;padding:28px 22px;
                max-width:300px;width:75%;
                box-shadow:0 20px 50px rgba(232,85,122,.2),0 4px 12px rgba(0,0,0,.06);
                display:flex;flex-direction:column;align-items:center;
                transform:translateY(100px);opacity:0;
                transition:transform .75s cubic-bezier(.34,1.42,.64,1),opacity .6s ease;
                position:relative;
            `);
            card.innerHTML = `
                <h2 style="font-family:'Cormorant Garamond',serif;color:#e8557a;font-size:26px;font-weight:700;margin-bottom:14px;">Happy Birthday Peshy 🎂</h2>
                <p style="font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;color:#7a4055;text-align:center;line-height:1.65;">Wishing you all the love, laughter,<br>and happiness in the world.</p>
                <div style="position:absolute;bottom:13px;right:16px;font-size:20px;">❤️</div>
            `;
            section.appendChild(card);
            document.body.appendChild(section);
            at(55, () => { card.style.transform = 'translateY(0)'; card.style.opacity = '1'; });
        }

        /* ── Util ─────────────────────────────────────────────── */
        function div(css) {
            const d = document.createElement('div');
            d.style.cssText = css;
            return d;
        }
    </script>
</body>
</html>
